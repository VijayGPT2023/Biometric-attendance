<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - NPC Biometric Attendance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a237e, #3949ab); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; max-width: 450px; width: 100%; text-align: center; }
        h1 { color: #333; margin-bottom: 8px; font-size: 1.3rem; }
        .msg { background: #e3f2fd; border: 1px solid #90caf9; border-radius: 10px; padding: 20px; margin: 20px 0; font-size: 0.92rem; color: #1565c0; line-height: 1.6; }
        .email { font-weight: 700; color: #0d47a1; font-size: 1.05rem; display: inline-block; margin-top: 8px; background: #bbdefb; padding: 6px 14px; border-radius: 6px; }
        .note { color: #666; font-size: 0.82rem; margin-top: 16px; line-height: 1.5; }
        .back { display: inline-block; margin-top: 20px; padding: 10px 28px; background: linear-gradient(135deg, #1a237e, #3949ab); color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Forgot Password?</h1>
        <div class="msg">
            To reset your password, please send an email with your
            <strong>Username</strong> and <strong>Employee Code</strong> to:
            <br><span class="email">vijay.kumar@npcindia.gov.in</span>
        </div>
        <p class="note">Your password will be reset within 1 working day.<br>Include your full name and department.</p>
        <a href="{{ url_for('auth.login') }}" class="back">Back to Login</a>
    </div>
</body>
</html>
