<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Biometric Attendance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center;
            align-items: center; padding: 20px;
        }
        .card {
            background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 32px; max-width: 400px; width: 100%;
        }
        h2 { margin-bottom: 20px; color: #333; font-size: 1.2rem; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 600; color: #555; margin-bottom: 4px; font-size: 0.85rem; }
        input {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem;
        }
        input:focus { outline: none; border-color: #667eea; }
        .btn {
            display: block; width: 100%; padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer;
        }
        .btn:hover { box-shadow: 0 4px 12px rgba(102,126,234,0.3); }
        .flash { background: #fff3cd; color: #856404; border: 1px solid #ffc107; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 0.88rem; }
        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { color: #667eea; text-decoration: none; font-size: 0.88rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Change Password</h2>
        {% with messages = get_flashed_messages() %}
        {% if messages %}{% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST" action="/change-password">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="old_password" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" required>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn">Change Password</button>
        </form>
        <div class="back-link"><a href="/">Back to Dashboard</a></div>
    </div>
</body>
</html>
