<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Biometric Attendance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .login-card {
            background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px; max-width: 400px; width: 100%;
        }
        h1 { text-align: center; color: #333; margin-bottom: 4px; font-size: 1.6rem; }
        .subtitle { text-align: center; color: #888; margin-bottom: 28px; font-size: 0.9rem; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; color: #444; margin-bottom: 6px; font-size: 0.88rem; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 1rem; transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
        .btn {
            display: block; width: 100%; padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; border: none; border-radius: 8px; font-size: 1.05rem;
            font-weight: 600; cursor: pointer; margin-top: 6px; transition: transform 0.15s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
        .flash {
            background: #fff3cd; color: #856404; border: 1px solid #ffc107;
            padding: 10px; border-radius: 8px; margin-bottom: 18px; font-size: 0.88rem;
        }
        .info { text-align: center; color: #999; font-size: 0.8rem; margin-top: 18px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Biometric Attendance</h1>
        <p class="subtitle">Sign in to access your dashboard</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="e.g. vijay.kumar or admin" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <div style="text-align:center; margin-top:14px;">
            <a href="/forgot-password" style="color:#667eea; font-size:0.85rem; text-decoration:none;">Forgot Password?</a>
        </div>
        <p class="info">Default password for first login: npc123</p>
    </div>
</body>
</html>
